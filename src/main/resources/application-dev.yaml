spring:
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  security:
    oauth2:
      authorizationserver:
        issuer-url: http://localhost:9000

logging:
  level:
    com.auth.server: DEBUG
    org.springframework.security: DEBUG
