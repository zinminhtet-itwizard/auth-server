spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  security:
    oauth2:
      authorizationserver:
        issuer-url: http://localhost:9000

logging:
  level:
    com.auth.server: WARN
    org.springframework.security: WARN
